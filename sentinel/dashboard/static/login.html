<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL — Вход</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="accent-bar" aria-hidden="true"></div>
    <div class="login-root">
        <form class="login-card login-form" id="login-form" autocomplete="off">
            <div class="login-logo">
                <span class="login-logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </span>
                SENTINEL
            </div>
            <div class="login-title">Вход в дашборд</div>
            <div class="login-hint">Введите пароль, заданный в настройках бота.</div>
            <label for="password-input">Пароль</label>
            <input type="password" id="password-input" name="password" required autocomplete="current-password" autofocus>
            <button type="submit" class="login-btn" id="login-btn">Войти</button>
            <div class="login-error" id="login-error" role="alert" aria-live="polite"></div>
        </form>
    </div>
    <script>
        (function() {
            'use strict';

            /* Minimal error reporter — mirrors _logError() in index.js so
               issues on the login page surface in backend logs even though
               the main dashboard bundle isn't loaded here. */
            function _reportError(scope, err, extra) {
                var msg = (err && err.message) || String(err || '');
                var stack = (err && err.stack) || null;
                try {
                    fetch('/api/client-error', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'same-origin',
                        keepalive: true,
                        body: JSON.stringify({
                            scope: 'login.' + String(scope || 'unknown'),
                            msg: msg,
                            extra: { stack: stack ? stack.slice(0, 2000) : null, extra: extra || null },
                        }),
                    }).catch(function() { /* swallow */ });
                } catch (_) { /* swallow */ }
            }
            window.addEventListener('error', function(ev) {
                _reportError('window.error', ev.error || ev.message,
                    { file: ev.filename, line: ev.lineno, col: ev.colno });
            });
            window.addEventListener('unhandledrejection', function(ev) {
                _reportError('unhandledrejection', ev.reason);
            });

            var form = document.getElementById('login-form');
            var input = document.getElementById('password-input');
            var btn = document.getElementById('login-btn');
            var errEl = document.getElementById('login-error');

            function showError(msg) {
                errEl.textContent = msg;
                errEl.classList.add('show');
            }
            function clearError() {
                errEl.classList.remove('show');
                errEl.textContent = '';
            }

            form.addEventListener('submit', async function(ev) {
                ev.preventDefault();
                clearError();
                btn.disabled = true;
                btn.textContent = 'Проверка…';
                try {
                    var r = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'same-origin',
                        body: JSON.stringify({ password: input.value })
                    });
                    var data = {};
                    try { data = await r.json(); } catch (_) { /* ignore */ }
                    if (r.ok && data.ok) {
                        window.location.href = '/';
                    } else {
                        showError(data.error || 'Неверный пароль');
                        btn.disabled = false;
                        btn.textContent = 'Войти';
                        input.select();
                    }
                } catch (e) {
                    _reportError('login.submit', e);
                    showError('Ошибка сети. Проверьте что бот запущен.');
                    btn.disabled = false;
                    btn.textContent = 'Войти';
                }
            });
        })();
    </script>
</body>
</html>
