<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL — Аналитика</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <link rel="stylesheet" href="/static/css/index.css">
</head>
<body>

    <!-- ═══ Gradient Accent Bar ═══ -->
    <div class="accent-bar" aria-hidden="true"></div>

    <!-- ═══ Header ═══ -->
    <header class="header" role="banner">
        <div class="header-left">
            <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Открыть меню" aria-expanded="false" aria-controls="sidebar">
                <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="header-logo">
                <div class="header-logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                SENTINEL
            </div>
            <span class="header-version" id="version-label">v1.5.0</span>
        </div>
        <div class="header-right">
            <div class="header-uptime" aria-label="Uptime">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                <span id="uptime-label">0m 0s</span>
            </div>
            <div class="header-sep"></div>
            <span id="mode-badge" class="badge badge-paper"><span class="badge-dot"></span>PAPER</span>
            <span id="state-badge" class="badge badge-normal"><span class="badge-dot"></span>NORMAL</span>
            <div class="header-sep"></div>
            <a href="/settings" class="header-nav-link" aria-label="Settings">
                <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </a>
            <div class="header-sep"></div>
            <div class="conn-indicator" aria-label="WebSocket">
                <span class="conn-dot disconnected" id="conn-dot"></span>
                <span id="conn-label">Offline</span>
            </div>
        </div>
    </header>

    <!-- ═══ Sidebar ═══ -->
    <div class="mobile-sidebar-backdrop" id="mobile-sidebar-backdrop" aria-hidden="true"></div>
    <nav class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation"></nav>

    <!-- ═══ Main Content ═══ -->
    <div class="app-layout">
    <main class="container" role="main">

        <div class="panel fade-in">
            <div class="panel-title"><h3>Strategy performance</h3></div>
                    </div>
                    <p class="panel-desc">Сравнение стратегий по прибыли. Видно какая стратегия зарабатывает, а какая сливает. Нажмите «Экспорт CSV» для анализа в Excel.</p>
                    <div class="strat-perf-grid" id="strat-perf-grid">
                        <div class="strat-log-empty">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:32px;height:32px;opacity:0.2;" aria-hidden="true"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
                            <div>Данных по стратегиям пока нет</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>
    </div><!-- /app-layout -->

    <!-- ═══ Footer ═══ -->
    <footer class="footer" role="contentinfo">
        <div class="footer-left">
            <span>SENTINEL Trading System</span>
            <span id="footer-version">v1.5.0</span>
            <span class="footer-dot" id="footer-conn">Подключено</span>
        </div>
        <div>
            <span id="footer-update">Последнее обновление: —</span>
        </div>
    </footer>

    <!-- ═══ Toast ═══ -->
    <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

    <script defer src="/static/js/lib/format.js"></script>
    <script defer src="/static/js/lib/risk.js"></script>
    <script defer src="/static/js/lib/time.js"></script>
    <script defer src="/static/js/lib/market-score.js"></script>
    <script defer src="/static/js/sidebar.js"></script>
    <script defer src="/static/js/index.js"></script>
</body>
</html>
