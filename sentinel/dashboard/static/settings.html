<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL — Settings</title>
    <meta name="description" content="SENTINEL Trading System Configuration Panel">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════
           RESET & DESIGN TOKENS
           ═══════════════════════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #030712;
            --bg-sidebar: #070b16;
            --bg-surface: #0c1220;
            --bg-card: rgba(14, 20, 35, 0.75);
            --bg-elevated: rgba(22, 30, 50, 0.85);
            --bg-input: #0a0f1c;
            --bg-hover: rgba(99, 102, 241, 0.06);

            --border-subtle: rgba(99, 102, 241, 0.06);
            --border-default: rgba(99, 102, 241, 0.12);
            --border-hover: rgba(99, 102, 241, 0.22);
            --border-focus: rgba(124, 58, 237, 0.5);

            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --text-inverse: #030712;

            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --accent-dim: rgba(124, 58, 237, 0.12);
            --accent-glow: rgba(124, 58, 237, 0.25);

            --green: #10b981;
            --green-dim: rgba(16, 185, 129, 0.10);
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.10);
            --amber: #f59e0b;
            --amber-dim: rgba(245, 158, 11, 0.10);
            --cyan: #06b6d4;
            --rose: #f43f5e;
            --violet: #8b5cf6;

            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --radius-full: 999px;

            --sidebar-w: 280px;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --smooth: cubic-bezier(0.16, 1, 0.3, 1);
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            overflow-x: hidden;
        }

        code { font-family: 'JetBrains Mono', monospace; font-size: 0.85em; color: var(--accent-light); }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* ═══════════════════════════════════════════
           AMBIENT BACKGROUND
           ═══════════════════════════════════════════ */
        .bg-mesh {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
            overflow: hidden;
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            will-change: transform;
        }
        .bg-orb--violet {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(124,58,237,0.3), transparent 70%);
            top: -10%; left: 20%;
            animation: orbDrift1 25s ease-in-out infinite;
        }
        .bg-orb--blue {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(59,130,246,0.2), transparent 70%);
            top: 40%; right: -5%;
            animation: orbDrift2 30s ease-in-out infinite;
        }
        .bg-orb--cyan {
            width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(6,182,212,0.15), transparent 70%);
            bottom: -5%; left: 40%;
            animation: orbDrift3 22s ease-in-out infinite;
        }

        @keyframes orbDrift1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(80px, 60px) scale(1.1); }
            66% { transform: translate(-40px, 30px) scale(0.95); }
        }
        @keyframes orbDrift2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-60px, -40px) scale(1.05); }
        }
        @keyframes orbDrift3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            40% { transform: translate(50px, -50px) scale(1.08); }
            80% { transform: translate(-30px, 20px) scale(0.96); }
        }

        /* ═══════════════════════════════════════════
           SIDEBAR
           ═══════════════════════════════════════════ */
        .sidebar {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: var(--sidebar-w);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-default);
            display: flex;
            flex-direction: column;
            z-index: 100;
            overflow-y: auto;
            transition: transform 0.35s var(--smooth);
        }

        .sidebar__brand {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .brand {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; color: inherit;
        }
        .brand__icon {
            width: 38px; height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
            transition: transform 0.3s var(--spring), box-shadow 0.3s var(--ease);
        }
        .brand:hover .brand__icon {
            transform: scale(1.08) rotate(-5deg);
            box-shadow: 0 6px 28px rgba(124, 58, 237, 0.45);
        }
        .brand__icon svg { width: 18px; height: 18px; }
        .brand__name {
            font-size: 15px; font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #f1f5f9, var(--accent-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand__label {
            display: block;
            font-size: 10px; font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: 1px;
        }

        .sidebar__nav {
            flex: 1;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-btn {
            display: flex; align-items: center; gap: 12px;
            width: 100%;
            padding: 10px 14px;
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--text-secondary);
            font: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.25s var(--ease);
            position: relative;
            text-align: left;
        }
        .nav-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-subtle);
        }
        .nav-btn.active {
            background: var(--accent-dim);
            color: var(--accent-light);
            border-color: rgba(124, 58, 237, 0.2);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.08);
        }
        .nav-btn.active .nav-btn__icon {
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            color: #fff;
            box-shadow: 0 2px 10px rgba(124, 58, 237, 0.35);
        }

        .nav-btn__icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: rgba(99, 102, 241, 0.06);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s var(--ease);
        }
        .nav-btn__icon svg { width: 16px; height: 16px; }

        .nav-btn__text { flex: 1; min-width: 0; }
        .nav-btn__title {
            display: block;
            font-weight: 600;
            font-size: 13px;
            line-height: 1.3;
        }
        .nav-btn__hint {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.3;
            margin-top: 1px;
        }
        .nav-btn.active .nav-btn__hint { color: rgba(167, 139, 250, 0.6); }

        .nav-btn__badge {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--amber);
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
            flex-shrink: 0;
            animation: pulseDot 2s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }

        .sidebar__footer {
            padding: 16px 14px;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .back-link {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px; font-weight: 600;
            transition: all 0.25s var(--ease);
        }
        .back-link:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .back-link svg { width: 14px; height: 14px; }

        .sidebar__version {
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.06em;
        }

        /* ═══════════════════════════════════════════
           MAIN CONTENT
           ═══════════════════════════════════════════ */
        .main {
            position: relative;
            z-index: 1;
            grid-column: 2;
            padding: 28px 36px 100px;
            max-width: 1100px;
            width: 100%;
        }

        .main__header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 28px;
            animation: slideIn 0.5s var(--smooth) both;
        }

        .main__title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.04em;
            display: flex;
            align-items: center;
            gap: 12px;
            line-height: 1.2;
        }
        .main__title svg {
            width: 26px; height: 26px;
            color: var(--accent-light);
        }
        .main__subtitle {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-muted);
            max-width: 600px;
            line-height: 1.6;
        }

        /* ═══════════════════════════════════════════
           BADGES
           ═══════════════════════════════════════════ */
        .badge {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .badge__dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .badge--paper { background: var(--accent-dim); color: var(--accent-light); }
        .badge--paper .badge__dot { background: var(--accent-light); }
        .badge--live { background: var(--green-dim); color: var(--green); }
        .badge--live .badge__dot { background: var(--green); box-shadow: 0 0 8px rgba(16,185,129,0.6); }

        /* ═══════════════════════════════════════════
           SETTINGS GRID & SECTIONS
           ═══════════════════════════════════════════ */
        .settings-grid { display: grid; gap: 0; }

        .section {
            display: none;
            animation: sectionEnter 0.4s var(--smooth) both;
        }
        .section.active { display: block; }

        @keyframes sectionEnter {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section__header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .section__icon {
            width: 44px; height: 44px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            background: var(--accent-dim);
            color: var(--accent-light);
            border: 1px solid rgba(124, 58, 237, 0.15);
        }
        .section__icon svg { width: 20px; height: 20px; }

        .section__info { flex: 1; }
        .section__title {
            font-size: 18px; font-weight: 700;
            letter-spacing: -0.02em;
            display: flex; align-items: center; gap: 10px;
        }
        .section__desc {
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .section__badge {
            padding: 5px 12px;
            border-radius: var(--radius-full);
            background: rgba(71, 85, 105, 0.12);
            color: var(--text-muted);
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* ═══════════════════════════════════════════
           SUB-GROUPS
           ═══════════════════════════════════════════ */
        .sub-group {
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(12px);
            transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease);
        }
        .sub-group:hover {
            border-color: var(--border-hover);
            box-shadow: 0 4px 30px rgba(0,0,0,0.15);
        }

        .sub-group__header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .sub-group__icon {
            width: 30px; height: 30px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .sub-group__icon svg { width: 14px; height: 14px; }
        .sub-group__name {
            font-size: 13px; font-weight: 700;
            letter-spacing: -0.01em;
        }
        .sub-group__hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto;
        }

        /* ═══════════════════════════════════════════
           FIELD CARDS (BENTO)
           ═══════════════════════════════════════════ */
        .field-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .field-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            display: grid;
            gap: 8px;
            transition: border-color 0.25s var(--ease), transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
        }
        .field-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .field-card.span-full { grid-column: 1 / -1; }

        .field-label {
            font-size: 11px; font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .field-hint {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* ═══════════════════════════════════════════
           FORM CONTROLS
           ═══════════════════════════════════════════ */
        .form-control {
            width: 100%;
            min-height: 42px;
            padding: 10px 14px;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            color: var(--text-primary);
            font: inherit;
            font-size: 13px;
            transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease), background 0.2s var(--ease);
        }
        .form-control:hover { border-color: var(--border-hover); }
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow), 0 0 20px rgba(124, 58, 237, 0.08);
            background: rgba(12, 16, 30, 0.95);
        }
        .form-control::placeholder { color: var(--text-muted); }
        textarea.form-control { min-height: 80px; resize: vertical; }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-position: right 14px center;
            background-repeat: no-repeat;
            padding-right: 36px;
            cursor: pointer;
        }

        /* Toggle Switch */
        .toggle { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; }
        .toggle__input { position: absolute; opacity: 0; pointer-events: none; }

        .toggle__track {
            width: 48px; height: 26px;
            border-radius: var(--radius-full);
            background: rgba(71, 85, 105, 0.35);
            border: 1px solid rgba(71, 85, 105, 0.3);
            position: relative;
            transition: all 0.3s var(--ease);
            flex-shrink: 0;
        }
        .toggle__track::after {
            content: '';
            position: absolute;
            top: 3px; left: 3px;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            transition: transform 0.3s var(--spring);
        }
        .toggle__input:checked + .toggle__track {
            background: var(--accent);
            border-color: rgba(124, 58, 237, 0.7);
            box-shadow: 0 0 16px rgba(124, 58, 237, 0.25);
        }
        .toggle__input:checked + .toggle__track::after {
            transform: translateX(22px);
        }
        .toggle__input:focus-visible + .toggle__track {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
        .toggle__label {
            font-size: 12px; font-weight: 600;
            color: var(--text-secondary);
            min-width: 60px;
        }

        /* ═══════════════════════════════════════════
           STRATEGY CARDS
           ═══════════════════════════════════════════ */
        .strategy-card {
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 14px;
            backdrop-filter: blur(12px);
            transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease);
            border-top: 3px solid var(--strategy-color, var(--accent));
        }
        .strategy-card:hover {
            border-color: var(--border-hover);
            box-shadow: 0 4px 30px rgba(0,0,0,0.15);
        }
        .strategy-card.is-enabled {
            border-top-color: var(--strategy-color, var(--green));
            box-shadow: 0 0 30px color-mix(in srgb, var(--strategy-color) 10%, transparent);
        }

        .strategy-card__header {
            display: flex; align-items: center; gap: 14px;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s var(--ease);
        }
        .strategy-card__header:hover { background: var(--bg-hover); }

        .strategy-card__glyph {
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            background: color-mix(in srgb, var(--strategy-color) 12%, transparent);
            color: var(--strategy-color);
            border: 1px solid color-mix(in srgb, var(--strategy-color) 15%, transparent);
            transition: all 0.3s var(--ease);
        }
        .strategy-card.is-enabled .strategy-card__glyph {
            box-shadow: 0 0 16px color-mix(in srgb, var(--strategy-color) 25%, transparent);
        }
        .strategy-card__glyph svg { width: 18px; height: 18px; }

        .strategy-card__info { flex: 1; min-width: 0; }
        .strategy-card__name {
            font-size: 14px; font-weight: 700;
            letter-spacing: -0.01em;
        }
        .strategy-card__desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .strategy-card__status {
            font-size: 10px; font-weight: 700;
            padding: 3px 10px;
            border-radius: var(--radius-full);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-right: 8px;
        }
        .strategy-card__status--on { background: var(--green-dim); color: var(--green); }
        .strategy-card__status--off { background: rgba(71,85,105,0.12); color: var(--text-muted); }

        .strategy-card__expand {
            width: 32px; height: 32px;
            border: none; border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s var(--ease);
        }
        .strategy-card__expand:hover { background: rgba(99,102,241,0.08); color: var(--text-primary); }
        .strategy-card__expand svg { width: 16px; height: 16px; transition: transform 0.3s var(--ease); }
        .strategy-card.is-open .strategy-card__expand svg { transform: rotate(180deg); }

        .strategy-card__body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s var(--smooth), padding 0.3s var(--ease);
            padding: 0 20px;
        }
        .strategy-card.is-open .strategy-card__body {
            max-height: 800px;
            padding: 0 20px 20px;
        }

        /* ═══════════════════════════════════════════
           FLOATING SAVE DOCK
           ═══════════════════════════════════════════ */
        .save-dock {
            position: fixed;
            bottom: 20px;
            left: calc(var(--sidebar-w) + 36px);
            right: 36px;
            max-width: 1028px;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 20px;
            background: rgba(10, 14, 26, 0.92);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-xl);
            box-shadow: 0 12px 40px rgba(0,0,0,0.35), 0 0 0 1px rgba(124,58,237,0.05);
            transform: translateY(0);
            transition: transform 0.4s var(--smooth), opacity 0.4s var(--ease);
        }
        .save-dock.hidden {
            transform: translateY(calc(100% + 40px));
            opacity: 0;
            pointer-events: none;
        }

        .save-dock__info {
            display: flex; align-items: center; gap: 12px;
        }
        .save-dock__icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: var(--accent-dim);
            display: flex; align-items: center; justify-content: center;
            color: var(--accent-light);
        }
        .save-dock__icon svg { width: 16px; height: 16px; }
        .save-dock__title {
            font-size: 13px; font-weight: 700;
        }
        .save-dock__hint {
            font-size: 11px; color: var(--text-muted);
        }

        .save-dock__actions {
            display: flex; align-items: center; gap: 8px;
            flex-wrap: wrap;
        }

        .save-dock__status {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 12px;
            border-radius: var(--radius-full);
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            background: rgba(71,85,105,0.12);
            color: var(--text-muted);
            white-space: nowrap;
        }
        .save-dock__status.saved { background: var(--green-dim); color: var(--green); }
        .save-dock__status.error { background: var(--red-dim); color: var(--red); }
        .save-dock__status.warning { background: var(--amber-dim); color: var(--amber); }

        /* ═══════════════════════════════════════════
           BUTTONS
           ═══════════════════════════════════════════ */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 7px;
            min-height: 40px;
            padding: 0 18px;
            border: none;
            border-radius: var(--radius-sm);
            font: inherit;
            font-size: 12px; font-weight: 700;
            cursor: pointer;
            transition: all 0.25s var(--ease);
            white-space: nowrap;
        }
        .btn svg { width: 14px; height: 14px; flex-shrink: 0; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn--primary {
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            color: #fff;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.25);
        }
        .btn--primary:hover:not(:disabled) {
            box-shadow: 0 6px 24px rgba(124, 58, 237, 0.4);
            transform: translateY(-1px);
        }

        .btn--outline {
            background: transparent;
            border: 1px solid var(--border-default);
            color: var(--text-secondary);
        }
        .btn--outline:hover:not(:disabled) {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .btn--ghost {
            background: transparent;
            color: var(--text-muted);
        }
        .btn--ghost:hover:not(:disabled) {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        /* ═══════════════════════════════════════════
           TOAST NOTIFICATIONS
           ═══════════════════════════════════════════ */
        .toast-stack {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 200;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: none;
        }
        .toast {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 18px;
            border-radius: var(--radius-md);
            background: rgba(14, 20, 35, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-default);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            font-size: 13px; font-weight: 600;
            pointer-events: auto;
            animation: toastIn 0.35s var(--smooth) both;
            min-width: 260px;
        }
        .toast.out { animation: toastOut 0.3s var(--ease) both; }
        .toast--success { border-color: rgba(16,185,129,0.3); }
        .toast--success .toast__icon { color: var(--green); }
        .toast--error { border-color: rgba(239,68,68,0.3); }
        .toast--error .toast__icon { color: var(--red); }
        .toast--info { border-color: rgba(124,58,237,0.3); }
        .toast--info .toast__icon { color: var(--accent-light); }

        .toast__icon { flex-shrink: 0; }
        .toast__icon svg { width: 16px; height: 16px; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(30px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes toastOut {
            to { opacity: 0; transform: translateX(30px) scale(0.95); }
        }

        /* ═══════════════════════════════════════════
           LOADING SKELETON
           ═══════════════════════════════════════════ */
        .loading-skeleton {
            display: grid; gap: 16px;
        }
        .skeleton-card {
            height: 120px;
            border-radius: var(--radius-lg);
            background: linear-gradient(90deg, var(--bg-card) 25%, rgba(99,102,241,0.04) 50%, var(--bg-card) 75%);
            background-size: 400% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ═══════════════════════════════════════════
           ENTRANCE ANIMATIONS
           ═══════════════════════════════════════════ */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stagger-in {
            animation: slideIn 0.4s var(--smooth) both;
        }

        /* ═══════════════════════════════════════════
           MOBILE HEADER
           ═══════════════════════════════════════════ */
        .mobile-header {
            display: none;
            position: fixed; top: 0; left: 0; right: 0;
            height: 56px; z-index: 90;
            background: rgba(7, 11, 22, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-default);
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }
        .mobile-menu-btn {
            width: 40px; height: 40px;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .mobile-menu-btn svg { width: 18px; height: 18px; }
        .mobile-title {
            flex: 1;
            font-size: 15px; font-weight: 700;
        }

        .sidebar-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }
        .sidebar-overlay.visible { display: block; }

        /* ═══════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════ */
        @media (max-width: 1100px) {
            .field-grid { grid-template-columns: 1fr; }
            .field-card.span-full { grid-column: span 1; }
        }

        @media (max-width: 900px) {
            body { grid-template-columns: 1fr; }
            .main { grid-column: 1; padding: 72px 20px 120px; }

            .sidebar {
                transform: translateX(-100%);
                box-shadow: 4px 0 30px rgba(0,0,0,0.4);
            }
            .sidebar.open { transform: translateX(0); }

            .mobile-header { display: flex; }

            .save-dock {
                left: 16px; right: 16px;
                bottom: 12px;
                flex-direction: column;
                align-items: stretch;
                padding: 12px 14px;
            }
            .save-dock__actions { width: 100%; }
            .save-dock__actions .btn { flex: 1; }

            .main__header { flex-direction: column; }
        }

        @media (max-width: 480px) {
            .main { padding: 68px 12px 130px; }
            .save-dock { left: 8px; right: 8px; bottom: 8px; }
        }
    </style>
</head>

    /* ═══════════════════════════════════════════
       HELPERS
       ═══════════════════════════════════════════ */
    function getSectionFields(section) {
        if (section.fieldGroups) {
            return section.fieldGroups.flatMap(function(g) { return g.fields; });
        }
        if (section.strategyGroups) {
            return section.strategyGroups.flatMap(function(g) { return g.fields; });
        }
        return section.fields || [];
    }

    function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = String(str != null ? str : '');
        return div.innerHTML;
    }

    function showToast(message, type) {
        type = type || 'info';
        var stack = document.getElementById('toast-stack');
        var icons = {
            success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
            error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
            info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
        };
        var toast = document.createElement('div');
        toast.className = 'toast toast--' + type;
        toast.innerHTML = '<span class="toast__icon">' + (icons[type] || icons.info) + '</span><span>' + escapeHtml(message) + '</span>';
        stack.appendChild(toast);
        setTimeout(function() {
            toast.classList.add('out');
            setTimeout(function() { toast.remove(); }, 300);
        }, 3500);
    }

    function setSaveStatus(text, type) {
        var node = document.getElementById('save-status');
        node.textContent = text;
        node.className = 'save-dock__status' + (type ? ' ' + type : '');
    }

    /* ═══════════════════════════════════════════
       STATE
       ═══════════════════════════════════════════ */
    var baselineValues = null;
    var hasUnsavedChanges = false;
    var activeSectionId = null;

    function stableStringify(value) {
        if (Array.isArray(value)) return '[' + value.map(stableStringify).join(',') + ']';
        if (value && typeof value === 'object') {
            return '{' + Object.keys(value).sort().map(function(k) {
                return JSON.stringify(k) + ':' + stableStringify(value[k]);
            }).join(',') + '}';
        }
        return JSON.stringify(value);
    }

    function valuesEqual(a, b) { return stableStringify(a) === stableStringify(b); }

    function getSectionById(id) {
        return SETTINGS_SCHEMA.find(function(s) { return s.id === id; }) || null;
    }

    function sectionHasChanges(section, current) {
        if (!baselineValues) return false;
        return getSectionFields(section).some(function(f) {
            return !valuesEqual(current[f.name], baselineValues[f.name]);
        });
    }

    function updateDirtyIndicators(current) {
        SETTINGS_SCHEMA.forEach(function(section) {
            var btn = document.querySelector('.nav-btn[data-section="' + section.id + '"]');
            if (!btn) return;
            var badge = btn.querySelector('.nav-btn__badge');
            var dirty = sectionHasChanges(section, current);
            badge.style.display = dirty ? 'block' : 'none';
        });
    }

    function updateDirtyState() {
        var current = collectValues();
        hasUnsavedChanges = baselineValues ? !valuesEqual(current, baselineValues) : false;
        updateDirtyIndicators(current);
        if (hasUnsavedChanges) {
            setSaveStatus('Unsaved changes', 'warning');
        } else {
            var st = document.getElementById('save-status');
            if (!st.classList.contains('saved') && !st.classList.contains('error')) {
                setSaveStatus('Loaded');
            }
        }
    }

    function renderBadge(mode) {
        var normalized = (mode || 'paper').toLowerCase();
        var html = '<span class="badge__dot"></span>' + escapeHtml(normalized.toUpperCase());
        var cls = 'badge ' + (normalized === 'live' ? 'badge--live' : 'badge--paper');
        ['mode-badge', 'mode-badge-mobile'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) { el.innerHTML = html; el.className = cls; }
        });
    }

    /* ═══════════════════════════════════════════
       NAVIGATION
       ═══════════════════════════════════════════ */
    function activateSection(sectionId) {
        activeSectionId = sectionId;

        document.querySelectorAll('.nav-btn').forEach(function(btn) {
            var isActive = btn.getAttribute('data-section') === sectionId;
            btn.classList.toggle('active', isActive);
        });

        document.querySelectorAll('.section').forEach(function(sec) {
            var isActive = sec.getAttribute('data-section') === sectionId;
            sec.classList.toggle('active', isActive);
            if (isActive) {
                sec.style.animation = 'none';
                sec.offsetHeight; /* reflow */
                sec.style.animation = '';
            }
        });

        /* Close mobile sidebar */
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('visible');
    }

    /* Sidebar nav clicks */
    document.querySelectorAll('.nav-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            activateSection(btn.getAttribute('data-section'));
        });
    });

    /* Mobile menu */
    document.getElementById('menu-toggle').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebar-overlay').classList.toggle('visible');
    });
    document.getElementById('sidebar-overlay').addEventListener('click', function() {
        document.getElementById('sidebar').classList.remove('open');
        this.classList.remove('visible');
    });

    /* ═══════════════════════════════════════════
       RENDERING
       ═══════════════════════════════════════════ */
    function renderField(field, value) {
        var val = value == null ? '' : value;
        var spanClass = 'field-card' + (field.span === 2 ? ' span-full' : '');

        if (field.type === 'checkbox') {
            return '<div class="' + spanClass + '">' +
                '<div class="field-label">' + escapeHtml(field.label) + '</div>' +
                '<label class="toggle">' +
                '<input class="toggle__input" type="checkbox" data-type="checkbox" name="' + escapeHtml(field.name) + '" ' + (val ? 'checked' : '') + '>' +
                '<span class="toggle__track"></span>' +
                '<span class="toggle__label">' + (val ? 'Enabled' : 'Disabled') + '</span>' +
                '</label>' +
                '<div class="field-hint">' + escapeHtml(field.hint || '') + '</div>' +
                '</div>';
        }

        if (field.type === 'select') {
            var opts = (field.options || []).map(function(o) {
                return '<option value="' + escapeHtml(o[0]) + '"' + (String(o[0]) === String(val) ? ' selected' : '') + '>' + escapeHtml(o[1]) + '</option>';
            }).join('');
            return '<div class="' + spanClass + '">' +
                '<div class="field-label">' + escapeHtml(field.label) + '</div>' +
                '<select class="form-control" data-type="select" name="' + escapeHtml(field.name) + '">' + opts + '</select>' +
                '<div class="field-hint">' + escapeHtml(field.hint || '') + '</div>' +
                '</div>';
        }

        if (field.type === 'textarea') {
            var tv = Array.isArray(val) ? val.join(', ') : String(val);
            return '<div class="' + spanClass + '">' +
                '<div class="field-label">' + escapeHtml(field.label) + '</div>' +
                '<textarea class="form-control mono" data-type="textarea" name="' + escapeHtml(field.name) + '" placeholder="' + escapeHtml(field.placeholder || '') + '">' + escapeHtml(tv) + '</textarea>' +
                '<div class="field-hint">' + escapeHtml(field.hint || '') + '</div>' +
                '</div>';
        }

        return '<div class="' + spanClass + '">' +
            '<div class="field-label">' + escapeHtml(field.label) + '</div>' +
            '<input class="form-control ' + (field.type === 'number' ? 'mono' : '') + '" ' +
            'type="' + escapeHtml(field.type) + '" ' +
            'data-type="' + escapeHtml(field.type) + '" ' +
            'data-number-type="' + escapeHtml(field.numberType || '') + '" ' +
            'name="' + escapeHtml(field.name) + '" ' +
            (field.step ? 'step="' + escapeHtml(field.step) + '" ' : '') +
            (field.min ? 'min="' + escapeHtml(field.min) + '" ' : '') +
            (field.max ? 'max="' + escapeHtml(field.max) + '" ' : '') +
            'value="' + escapeHtml(val) + '" ' +
            'placeholder="' + escapeHtml(field.placeholder || '') + '">' +
            '<div class="field-hint">' + escapeHtml(field.hint || '') + '</div>' +
            '</div>';
    }

    function renderSubGroup(group, values) {
        var fieldsHtml = group.fields.map(function(f) { return renderField(f, values[f.name]); }).join('');
        return '<div class="sub-group">' +
            '<div class="sub-group__header">' +
                '<div class="sub-group__icon" style="background:' + (group.bg || 'var(--accent-dim)') + ';color:' + (group.color || 'var(--accent-light)') + '">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + group.icon + '</svg>' +
                '</div>' +
                '<span class="sub-group__name">' + escapeHtml(group.name) + '</span>' +
                '<span class="sub-group__hint">' + group.fields.length + ' params</span>' +
            '</div>' +
            '<div class="field-grid">' + fieldsHtml + '</div>' +
        '</div>';
    }

    function renderStrategyCard(group, values) {
        var isEnabled = !!values[group.enableField];
        var bodyFields = group.fields.filter(function(f) { return f.name !== group.enableField; });
        var bodyHtml = bodyFields.map(function(f) { return renderField(f, values[f.name]); }).join('');

        return '<div class="strategy-card' + (isEnabled ? ' is-enabled' : '') + '" data-strategy="' + escapeHtml(group.id) + '" style="--strategy-color:' + group.color + '">' +
            '<div class="strategy-card__header" onclick="toggleStrategyCard(\'' + escapeHtml(group.id) + '\')">' +
                '<div class="strategy-card__glyph">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + group.icon + '</svg>' +
                '</div>' +
                '<div class="strategy-card__info">' +
                    '<div class="strategy-card__name">' + escapeHtml(group.name) + '</div>' +
                    '<div class="strategy-card__desc">' + escapeHtml(group.description) + '</div>' +
                '</div>' +
                '<span class="strategy-card__status ' + (isEnabled ? 'strategy-card__status--on' : 'strategy-card__status--off') + '">' + (isEnabled ? 'Active' : 'Off') + '</span>' +
                '<label class="toggle" onclick="event.stopPropagation()">' +
                    '<input class="toggle__input" type="checkbox" data-type="checkbox" name="' + escapeHtml(group.enableField) + '" ' + (isEnabled ? 'checked' : '') + '>' +
                    '<span class="toggle__track"></span>' +
                '</label>' +
                '<button class="strategy-card__expand" type="button" onclick="event.stopPropagation(); toggleStrategyCard(\'' + escapeHtml(group.id) + '\')">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
                '</button>' +
            '</div>' +
            '<div class="strategy-card__body">' +
                '<div class="field-grid">' + bodyHtml + '</div>' +
            '</div>' +
        '</div>';
    }

    function toggleStrategyCard(id) {
        var card = document.querySelector('.strategy-card[data-strategy="' + id + '"]');
        if (card) card.classList.toggle('is-open');
    }

    function renderSections(values) {
        var form = document.getElementById('settings-form');
        var html = '';

        SETTINGS_SCHEMA.forEach(function(section, index) {
            var innerHtml = '';

            /* Section header */
            innerHtml += '<div class="section__header">' +
                '<div class="section__icon">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + section.icon + '</svg>' +
                '</div>' +
                '<div class="section__info">' +
                    '<div class="section__title">' + escapeHtml(section.title) + '</div>' +
                    '<div class="section__desc">' + escapeHtml(section.subtitle) + '</div>' +
                '</div>' +
                '<span class="section__badge">' + escapeHtml(section.badge) + '</span>' +
            '</div>';

            /* Strategy groups */
            if (section.strategyGroups) {
                innerHtml += section.strategyGroups.map(function(g) {
                    return renderStrategyCard(g, values);
                }).join('');
            }
            /* Field sub-groups */
            else if (section.fieldGroups) {
                innerHtml += section.fieldGroups.map(function(g) {
                    return renderSubGroup(g, values);
                }).join('');
            }
            /* Flat fields */
            else if (section.fields) {
                innerHtml += '<div class="field-grid">' +
                    section.fields.map(function(f) { return renderField(f, values[f.name]); }).join('') +
                '</div>';
            }

            html += '<div class="section' + (index === 0 ? ' active' : '') + '" data-section="' + escapeHtml(section.id) + '">' +
                innerHtml + '</div>';
        });

        form.innerHTML = html;

        /* Bind toggle text updates */
        form.querySelectorAll('.toggle__input').forEach(function(input) {
            input.addEventListener('change', function() {
                var label = input.parentElement.querySelector('.toggle__label');
                if (label) label.textContent = input.checked ? 'Enabled' : 'Disabled';

                /* Update strategy card state */
                var card = input.closest('.strategy-card');
                if (card) {
                    var isOn = input.checked;
                    card.classList.toggle('is-enabled', isOn);
                    var st = card.querySelector('.strategy-card__status');
                    if (st) {
                        st.textContent = isOn ? 'Active' : 'Off';
                        st.className = 'strategy-card__status ' + (isOn ? 'strategy-card__status--on' : 'strategy-card__status--off');
                    }
                }

                updateDirtyState();
            });
        });

        /* Bind input changes */
        form.querySelectorAll('.form-control').forEach(function(input) {
            input.addEventListener('input', updateDirtyState);
            input.addEventListener('change', updateDirtyState);
        });

        activateSection(SETTINGS_SCHEMA[0].id);
    }

    /* ═══════════════════════════════════════════
       VALUE COLLECTION
       ═══════════════════════════════════════════ */
    function normalizeTradingSymbols(value) {
        return String(value)
            .split(/[\n,\s]+/)
            .map(function(s) { return s.trim().toUpperCase(); })
            .filter(Boolean);
    }

    function collectValues() {
        var values = {};
        SETTINGS_SCHEMA.forEach(function(section) {
            getSectionFields(section).forEach(function(field) {
                var input = document.querySelector('[name="' + field.name + '"]');
                if (!input) return;

                if (field.type === 'checkbox') {
                    values[field.name] = input.checked;
                    return;
                }
                if (field.name === 'trading_symbols') {
                    values[field.name] = normalizeTradingSymbols(input.value);
                    return;
                }
                if (field.type === 'number') {
                    var raw = input.value.trim();
                    values[field.name] = raw ? (field.numberType === 'int' ? parseInt(raw, 10) : parseFloat(raw)) : 0;
                    return;
                }
                values[field.name] = input.value;
            });
        });
        return values;
    }

    function setFieldInputValue(field, value) {
        var input = document.querySelector('[name="' + field.name + '"]');
        if (!input) return;

        if (field.type === 'checkbox') {
            input.checked = !!value;
            var label = input.parentElement.querySelector('.toggle__label');
            if (label) label.textContent = input.checked ? 'Enabled' : 'Disabled';
            /* Update strategy card too */
            var card = input.closest('.strategy-card');
            if (card) {
                card.classList.toggle('is-enabled', !!value);
                var st = card.querySelector('.strategy-card__status');
                if (st) {
                    st.textContent = value ? 'Active' : 'Off';
                    st.className = 'strategy-card__status ' + (value ? 'strategy-card__status--on' : 'strategy-card__status--off');
                }
            }
            return;
        }
        if (field.name === 'trading_symbols') {
            input.value = Array.isArray(value) ? value.join(', ') : String(value || '');
            return;
        }
        input.value = value == null ? '' : String(value);
    }

    function resetActiveSection() {
        if (!baselineValues || !activeSectionId) return;
        var section = getSectionById(activeSectionId);
        if (!section) return;

        var current = collectValues();
        if (!sectionHasChanges(section, current)) {
            showToast('Section already clean', 'info');
            return;
        }
        if (!confirm('Reset changes in the active section?')) return;

        getSectionFields(section).forEach(function(f) {
            setFieldInputValue(f, baselineValues[f.name]);
        });
        updateDirtyState();

        if (hasUnsavedChanges) {
            setSaveStatus('Section reset, other changes remain', 'warning');
        } else {
            setSaveStatus('Section reset');
        }
        showToast('Section reset to saved values', 'info');
    }

    /* ═══════════════════════════════════════════
       API
       ═══════════════════════════════════════════ */
    async function loadEditableSettings() {
        if (hasUnsavedChanges && !confirm('You have unsaved changes. Reload values from disk anyway?')) return;
        setSaveStatus('Loading…');
        try {
            var response = await fetch('/api/settings/editable');
            var payload = await response.json();
            if (!response.ok) throw new Error(payload.error || 'Failed to load settings');
            renderSections(payload.values || {});
            baselineValues = payload.values || {};
            hasUnsavedChanges = false;
            renderBadge(payload.values && payload.values.trading_mode ? payload.values.trading_mode : 'paper');
            setSaveStatus('Loaded');
            showToast('Settings loaded successfully', 'success');
        } catch (error) {
            document.getElementById('settings-form').innerHTML =
                '<div class="section active" data-section="control"><div style="padding:40px;text-align:center;color:var(--text-muted)">' + escapeHtml(error.message) + '</div></div>';
            setSaveStatus('Load error', 'error');
            showToast(error.message, 'error');
        }
    }

    async function saveSettings() {
        var btn = document.getElementById('save-btn');
        btn.disabled = true;
        setSaveStatus('Saving…');
        try {
            var response = await fetch('/api/settings/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(collectValues())
            });
            var payload = await response.json();
            if (!response.ok) throw new Error(payload.error || 'Save failed');
            baselineValues = collectValues();
            hasUnsavedChanges = false;
            updateDirtyIndicators(baselineValues);
            renderBadge(payload.values && payload.values.trading_mode ? payload.values.trading_mode : 'paper');
            setSaveStatus('Saved ✓', 'saved');
            showToast('Settings saved. Restart to apply engine changes.', 'success');
        } catch (error) {
            setSaveStatus(error.message, 'error');
            showToast(error.message, 'error');
        } finally {
            btn.disabled = false;
        }
    }

    /* ═══════════════════════════════════════════
       EVENT BINDINGS
       ═══════════════════════════════════════════ */
    window.addEventListener('beforeunload', function(e) {
        if (!hasUnsavedChanges) return;
        e.preventDefault();
        e.returnValue = '';
    });

    document.getElementById('reload-btn').addEventListener('click', loadEditableSettings);
    document.getElementById('reset-section-btn').addEventListener('click', resetActiveSection);
    document.getElementById('save-btn').addEventListener('click', saveSettings);

    /* ═══════════════════════════════════════════
       INIT
       ═══════════════════════════════════════════ */
    loadEditableSettings();
    </script>
</body>
</html>
